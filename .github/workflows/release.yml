name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Skip if this commit was made by this workflow (prevents infinite loop)
    if: "${{ !contains(github.event.head_commit.message, 'chore: bump version') }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full check
        run: npm run check

      - name: Generate version
        run: |
          VERSION="v$(date '+%Y.%m.%d').$GITHUB_RUN_NUMBER"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ZIP_NAME=tab-organizer-latest.zip" >> $GITHUB_ENV

      - name: Build project
        run: npm run build

      - name: Zip dist folder
        run: |
          cd dist
          zip -r ../${{ env.ZIP_NAME }} .
          cd ..

      - name: Create version tag
        run: |
          git fetch origin "refs/tags/${{ env.VERSION }}:refs/tags/${{ env.VERSION }}" || true
          if git rev-parse --verify --quiet "refs/tags/${{ env.VERSION }}" >/dev/null; then
            EXISTING_SHA="$(git rev-list -n 1 "${{ env.VERSION }}")"
            if [ "$EXISTING_SHA" != "$GITHUB_SHA" ]; then
              echo "Tag ${{ env.VERSION }} already exists at $EXISTING_SHA, expected $GITHUB_SHA"
              exit 1
            fi
            echo "Tag ${{ env.VERSION }} already exists for this commit; continuing."
          else
            git tag "${{ env.VERSION }}" "${GITHUB_SHA}"
            git push origin "refs/tags/${{ env.VERSION }}"
          fi

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Tab Organizer ${{ env.VERSION }}"
          body: |
            Version: ${{ env.VERSION }}
            Commit: ${{ github.event.head_commit.message }}
          files: ${{ env.ZIP_NAME }}
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove legacy latest tag release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --cleanup-tag --yes
          elif git ls-remote --exit-code --tags origin latest >/dev/null 2>&1; then
            git push origin :refs/tags/latest
          fi

      - name: Clean up old tags
        run: |
          git fetch --tags origin
          TAGS=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname)
          COUNT=$(echo "$TAGS" | wc -l)
          if [ $COUNT -gt 30 ]; then
            echo "$TAGS" | tail -n +31 | xargs -r git push origin --delete
          fi
