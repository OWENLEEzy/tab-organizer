name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Zip dist folder
        run: |
          cd dist
          zip -r ../tab-organizer-latest.zip .
          cd ..

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Tab Organizer (Latest Build)"
          body: |
            Latest pre-built release of Tab Organizer.
            
            **Installation:**
            1. Download `tab-organizer-latest.zip` (NOT the Source Code).
            2. Unzip the file.
            3. Load the folder in `chrome://extensions` (Developer Mode).
            
            Commit: ${{ github.event.head_commit.message }}
          files: tab-organizer-latest.zip
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
