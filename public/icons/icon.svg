<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Tab Out icon</title>
  <desc id="desc">Layered digital folders flowing into a glowing secure folder.</desc>
  <defs>
    <radialGradient id="tileGlow" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#092545"/>
      <stop offset="0.58" stop-color="#041225"/>
      <stop offset="1" stop-color="#01050C"/>
    </radialGradient>
    <linearGradient id="tileEdge" x1="22" y1="4" x2="112" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16385A"/>
      <stop offset="0.45" stop-color="#061A32"/>
      <stop offset="1" stop-color="#00050B"/>
    </linearGradient>
    <linearGradient id="folderBack" x1="28" y1="34" x2="80" y2="75" gradientUnits="userSpaceOnUse">
      <stop stop-color="#193B5E" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0B213E" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="folderMid" x1="36" y1="45" x2="90" y2="83" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A5470" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#113451" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="62" y1="54" x2="110" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5DF8F1"/>
      <stop offset="0.55" stop-color="#35D7D0"/>
      <stop offset="1" stop-color="#18AFA8"/>
    </linearGradient>
    <linearGradient id="folderFace" x1="67" y1="59" x2="104" y2="91" gradientUnits="userSpaceOnUse">
      <stop stop-color="#70F8F3" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#31C9C4" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000813" flood-opacity="0.65"/>
    </filter>
    <filter id="cyanGlow" x="-55%" y="-55%" width="210%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#51FFF2" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#21D8CF" flood-opacity="0.55"/>
    </filter>
    <filter id="lineGlow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="0.45" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="circuit" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M1 11H9V3M9 3H16M16 3V8H22M2 19H12V14H19M19 14V22" fill="none" stroke="#1B5E83" stroke-width="0.75" opacity="0.34"/>
      <circle cx="9" cy="3" r="1.1" fill="#1B5E83" opacity="0.4"/>
      <circle cx="19" cy="14" r="1" fill="#1B5E83" opacity="0.35"/>
      <circle cx="22" cy="8" r="0.9" fill="#1B5E83" opacity="0.3"/>
    </pattern>
  </defs>

  <rect x="2" y="1" width="124" height="126" rx="29" fill="url(#tileGlow)"/>
  <rect x="2.5" y="1.5" width="123" height="125" rx="28.5" fill="none" stroke="url(#tileEdge)" stroke-width="2.6"/>
  <rect x="8" y="8" width="112" height="112" rx="25" fill="url(#circuit)" opacity="0.55"/>
