    <path d="M39 54.8C39 50.8 42.2 47.6 46.2 47.6H60.9C63.4 47.6 65.7 48.9 67 51L70.2 56.2C71.5 58.3 73.8 59.6 76.3 59.6H88.8C92.8 59.6 96 62.8 96 66.8V83.1C96 87.1 92.8 90.3 88.8 90.3H46.2C42.2 90.3 39 87.1 39 83.1V54.8Z" fill="#1D7181" opacity="0.66" stroke="#5EA8B6" stroke-width="0.9"/>
  </g>

  <g filter="url(#lineGlow)" fill="none" stroke-linecap="round">
    <path d="M4 72C18 65 32 65 47 72C56 76 63 76 72 72" stroke="#64FFF5" stroke-width="1.1" opacity="0.86"/>
    <path d="M5 68C22 75 38 76 52 70C59 67 66 67 75 70" stroke="#28D7D1" stroke-width="0.8" opacity="0.8"/>
    <path d="M7 77C22 70 36 69 50 76C58 80 67 79 75 75" stroke="#45F1E8" stroke-width="0.75" opacity="0.72"/>
    <path d="M13 64C27 69 38 70 51 66C58 64 66 64 76 67" stroke="#52FFF4" stroke-width="0.55" opacity="0.6"/>
    <circle cx="17" cy="66" r="0.8" fill="#7FFFF7" opacity="0.75"/>
    <circle cx="29" cy="72" r="0.7" fill="#7FFFF7" opacity="0.65"/>
    <circle cx="43" cy="67" r="0.65" fill="#7FFFF7" opacity="0.6"/>
    <circle cx="55" cy="75" r="0.55" fill="#7FFFF7" opacity="0.58"/>
  </g>

  <g filter="url(#cyanGlow)">
    <path d="M60 62.5C60 56.8 64.6 52.2 70.3 52.2H82.4C85.8 52.2 88.9 53.9 90.8 56.6L94.7 62.1C96.6 64.8 99.7 66.4 103 66.4H107.8C113.5 66.4 118.1 71 118.1 76.7V90.4C118.1 96.1 113.5 100.7 107.8 100.7H70.3C64.6 100.7 60 96.1 60 90.4V62.5Z" fill="url(#folderFront)"/>
